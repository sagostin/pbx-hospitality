version: "3.8"

services:
  hospitality:
    build: .
    environment:
      CONFIG_PATH: /config/config.yaml
      DB_PASSWORD: ${DB_PASSWORD:-hospitality}
      HOTEL_ALPHA_ARI_SECRET: ${HOTEL_ALPHA_ARI_SECRET:-secret}
      HOTEL_BETA_ARI_SECRET: ${HOTEL_BETA_ARI_SECRET:-secret}
    ports:
      - "8080:8080"
    volumes:
      - ./config:/config:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hospitality
      POSTGRES_USER: hospitality
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hospitality}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hospitality -d hospitality" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
