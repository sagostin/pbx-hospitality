version: "3.8"

services:
  hospitality:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: hospitality
      DB_PASSWORD: ${DB_PASSWORD:-hospitality}
      DB_NAME: hospitality
      DB_SSL_MODE: disable
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health" ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: hospitality
      POSTGRES_USER: hospitality
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hospitality}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U hospitality -d hospitality" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
