# Example configuration for Hospitality PMS Integration
# Supports multiple PBX backends (Bicom, Zultys, etc.)

server:
  port: 8080

database:
  host: "10.0.0.5"
  port: 5432
  user: "hospitality"
  password: "${DB_PASSWORD}"
  database: "hospitality"
  ssl_mode: "require"

crypto:
  master_key: "${ENCRYPTION_MASTER_KEY}"

logging:
  level: "info"
  format: "json"
  loki_enabled: true
  loki_url: "${LOKI_ENDPOINT}"
  loki_batch_size: 100
  loki_batch_wait: 5
  websocket_logs:
    enabled: true
    path: "/ws/logs"
    auth_token: "${SERVICE_NAME}"